<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- PWA META -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>iPod</title>

<link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">

<style>
:root{
--body:#f5f5f5;
--accent:#2f6edb;
}

body{
margin:0;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'SF Pro Display', -apple-system;
}

.ipod{
width:260px;height:520px;
border-radius:30px;
background:var(--body);
box-shadow:0 30px 60px rgba(0,0,0,0.35);
padding-top:20px;
}

.screen{
width:210px;height:160px;
margin:auto;
border:3px solid #333;
background:#eaeaea;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topbar{
display:flex;
justify-content:space-between;
font-size:11px;
padding:2px 6px;
}

.header{
background:var(--accent);
color:#fff;
text-align:center;
font-size:13px;
}

.list{
flex:1;
overflow:hidden;
position:relative;
}

.list-inner{
position:absolute;
width:100%;
}

.item{padding:5px;}
.sel{background:var(--accent);color:#fff;}

.progress{height:5px;background:#ccc;margin:5px;}
.bar{height:100%;background:var(--accent);}
.time{display:flex;justify-content:space-between;font-size:11px;padding:0 5px;}

.wheel{
margin:25px auto;
width:200px;height:200px;
background:#eee;
border-radius:50%;
position:relative;
touch-action:none;
}

.center{width:80px;height:80px;background:#ddd;border-radius:50%;position:absolute;top:60px;left:60px;}
.menuBtn{position:absolute;top:15px;left:80px;}
.playBtn{position:absolute;bottom:15px;left:85px;}
.leftBtn{position:absolute;top:95px;left:15px;}
.rightBtn{position:absolute;top:95px;right:15px;}
</style>
</head>

<body>

<div class="ipod">

<div class="screen">
<div class="topbar">
<span id="clock"></span>
<span>100%</span>
</div>

<div class="header" id="header">iPod</div>
<div class="list">
<div id="content" class="list-inner"></div>
</div>
</div>

<div class="wheel" id="wheel">
<div class="menuBtn" id="menuBtn">MENU</div>
<div class="playBtn" id="playBtn">▶⏸</div>
<div class="leftBtn" id="prevBtn">⏮</div>
<div class="rightBtn" id="nextBtn">⏭</div>
<div class="center" id="centerBtn"></div>
</div>

<input type="file" id="files" multiple hidden>

</div>

<script>

/* REGISTER SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

/* CLOCK */
setInterval(()=>{
let d=new Date()
clock.textContent=d.getHours()+":"+(d.getMinutes()+"").padStart(2,"0")
},1000)

/* AUDIO */
let audio=new Audio(),songs=[],cur=0
audio.onended=()=>next()

function play(i){
cur=i
audio.src=songs[i].url
audio.play()
screen="now"
render()
}

function toggle(){audio.paused?audio.play():audio.pause()}
function next(){if(songs.length)play((cur+1)%songs.length)}
function prev(){if(songs.length)play((cur-1+songs.length)%songs.length)}

/* IMPORT */
files.onchange=e=>{
for(let f of e.target.files){
songs.push({name:f.name.replace(".mp3",""),url:URL.createObjectURL(f)})
}
render()
}

/* THEMES */
let themes={
Default:{body:"#f5f5f5",accent:"#2f6edb"},
Black:{body:"#111",accent:"#fff"},
Blue:{body:"#dbeafe",accent:"#2563eb"},
Green:{body:"#dcfce7",accent:"#16a34a"},
Pink:{body:"#ffe4e6",accent:"#db2777"},
Silver:{body:"#e5e7eb",accent:"#6b7280"},
Red:{body:"#fee2e2",accent:"#dc2626"},
U2:{body:"#000",accent:"#ff0000"}
}

function setTheme(name){
let t=themes[name]
document.documentElement.style.setProperty("--body",t.body)
document.documentElement.style.setProperty("--accent",t.accent)
}

/* MENU */
let screen="menu",sel=0,scroll=0

function data(){
if(screen==="menu") return ["Music","Settings"]
if(screen==="music") return ["Songs"]
if(screen==="songs") return songs.map(s=>s.name)
if(screen==="settings") return ["Import Music","Themes"]
if(screen==="themes") return Object.keys(themes)
return []
}

/* SCROLL ENGINE */
function updateScroll(items){
let visible=6
if(sel<scroll) scroll=sel
if(sel>=scroll+visible) scroll=sel-visible+1
if(scroll<0) scroll=0
if(scroll>items.length-visible) scroll=Math.max(0,items.length-visible)
content.style.transform=`translateY(-${scroll*24}px)`
}

/* RENDER */
function render(){
content.innerHTML=""
header.textContent=screen==="now"?"Now Playing":"iPod"

if(screen==="now"){
let t=audio.currentTime||0
let d=audio.duration||1
content.innerHTML=`
<div>${songs[cur]?.name||""}</div>
<div class="progress"><div class="bar" style="width:${(t/d)*100}%"></div></div>
<div class="time"><span>${fmt(t)}</span><span>-${fmt(d-t)}</span></div>`
return
}

let items=data()
items.forEach((t,i)=>{
let d=document.createElement("div")
d.textContent=t
d.className="item"+(i===sel?" sel":"")
content.appendChild(d)
})

updateScroll(items)
}

function fmt(s){
let m=Math.floor(s/60)
let sec=Math.floor(s%60).toString().padStart(2,"0")
return m+":"+sec
}

/* SELECT */
function select(){
let item=data()[sel]

if(screen==="menu") screen=item==="Music"?"music":"settings"
else if(screen==="music") screen="songs"
else if(screen==="songs") play(sel)
else if(screen==="settings"){
if(item==="Import Music") files.click()
if(item==="Themes") screen="themes"
}
else if(screen==="themes"){
setTheme(item)
screen="settings"
}

sel=0
scroll=0
render()
}

/* WHEEL */
let lastAngle=0,accum=0

wheel.onpointerdown=e=>{
let r=wheel.getBoundingClientRect()
lastAngle=Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))
wheel.setPointerCapture(e.pointerId)
}

wheel.onpointermove=e=>{
if(e.buttons===0)return

let r=wheel.getBoundingClientRect()
let a=Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))
let d=a-lastAngle

if(d>Math.PI)d-=2*Math.PI
if(d<-Math.PI)d+=2*Math.PI

accum+=d
let sensitivity=0.08

while(Math.abs(accum)>sensitivity){
sel+=accum>0?1:-1
let len=data().length
if(sel<0) sel=len-1
if(sel>=len) sel=0
accum+=accum>0?-sensitivity:sensitivity
render()
}

lastAngle=a
}

wheel.onpointerup=()=>accum=0

/* BUTTONS */
centerBtn.onclick=select
menuBtn.onclick=()=>{screen="menu";sel=0;scroll=0;render()}
playBtn.onclick=toggle
nextBtn.onclick=next
prevBtn.onclick=prev

setInterval(()=>{if(screen==="now")render()},500)

render()

</script>
</body>
</html>
